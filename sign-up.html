<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fornix — Sign Up</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-root">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-bar">
          <div class="auth-brand-dot"></div>
          <span class="auth-brand-name">Fornix</span>
        </div>
        <div class="auth-title">Create your account</div>
        <div class="auth-sub">Start managing payments in minutes.</div>
      </div>

      <form class="auth-form" id="signupForm">
        <div class="auth-field">
          <label class="auth-label">Full Name</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
            <input class="auth-input" type="text" placeholder="Abiodun Ogunlesi" required style="padding-left:40px;">
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label">Email</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
            <input class="auth-input" type="email" placeholder="you@company.com" required style="padding-left:40px;">
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label">Password</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input class="auth-input" id="signupPassword" type="password" placeholder="Create a strong password" required style="padding-left:40px;padding-right:40px;">
            <button type="button" class="auth-password-toggle" tabindex="-1"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
          </div>
          <div class="auth-strength">
            <div class="auth-strength-bar"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="auth-strength-text"></div>
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label">Confirm Password</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input class="auth-input" id="signupConfirm" type="password" placeholder="Re-enter password" required style="padding-left:40px;padding-right:40px;">
            <button type="button" class="auth-password-toggle" tabindex="-1"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
          </div>
          <div class="auth-error-msg"></div>
        </div>

        <label class="auth-check" style="font-size:12px;"><input type="checkbox" required> I agree to the <a href="#" class="auth-link" style="font-size:12px;">Terms of Service</a> and <a href="#" class="auth-link" style="font-size:12px;">Privacy Policy</a></label>

        <button class="auth-submit" type="submit">Create Account</button>
      </form>

      <div class="auth-divider">or continue with</div>

      <div class="auth-social">
        <button class="auth-social-btn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="21.17" y1="8" x2="12" y2="8"/><line x1="3.95" y1="6.06" x2="8.54" y2="14"/><line x1="10.88" y1="21.94" x2="15.46" y2="14"/></svg> Google</button>
        <button class="auth-social-btn"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg> X</button>
        <button class="auth-social-btn"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M9.101 23.691v-7.98H6.627v-2.87h2.474v-1.58c0-4.085 1.848-5.978 5.858-5.978.401 0 .955.042 1.468.103a8.68 8.68 0 0 1 1.141.195v3.165a8.65 8.65 0 0 0-.653-.073c-.565-.026-1.1.014-1.515.126-1.052.245-1.448.992-1.448 1.929v1.233h2.75l-.436 2.87h-2.314v7.98c-2.338.73-4.912.574-6.452-.36Z"/></svg> GitHub</button>
      </div>

      <div class="auth-footer">Already have an account? <a href="sign-in.html" class="auth-link">Sign in</a></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="auth-toast" id="authToast">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--green);"><polyline points="20 6 9 17 4 12"/></svg>
  <span class="auth-toast-text" style="font-size:13px;font-weight:600;"></span>
</div>

<script src="js/auth.js"></script>
</body>
</html>
